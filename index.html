<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StreamHub Ultimate</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0f;
  color: white;
}

/* NAV */
header {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: black;
  position: sticky;
  top: 0;
}

.logo {
  color: #00ffe1;
  font-size: 24px;
}

/* SEARCH */
input {
  padding: 8px;
  border-radius: 6px;
  border: none;
  background: #222;
  color: white;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px,1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.1);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

/* DETAIL PAGE */
#detailPage {
  display: none;
  padding: 20px;
}

.detail-container {
  display: flex;
  gap: 20px;
}

.detail-container img {
  width: 300px;
  border-radius: 10px;
}

.buttons button {
  margin: 10px 5px;
  padding: 10px;
  border: none;
  cursor: pointer;
}

.watch {
  background: #00ffe1;
}

.download {
  background: red;
  color: white;
}
</style>
</head>

<body>

<header>
  <div class="logo">StreamHub Ultimate</div>
  <input type="text" id="search" placeholder="Search movies...">
</header>

<div id="homePage" class="grid"></div>

<div id="detailPage">
  <button onclick="goBack()">⬅ Back</button>

  <div class="detail-container">
    <img id="detailImg">
    <div>
      <h1 id="detailTitle"></h1>
      <p id="detailDesc"></p>

      <div class="buttons">
        <button class="watch" onclick="playMovie()">▶ Watch</button>
        <a id="downloadLink" download>
          <button class="download">⬇ Download</button>
        </a>
      </div>
    </div>
  </div>
</div>

<video id="player" controls style="width:100%; display:none;"></video>

<script>
const home = document.getElementById("homePage");
const detailPage = document.getElementById("detailPage");
const player = document.getElementById("player");

let movies = [];

/* GENERATE 200+ MOVIES */
for (let i = 1; i <= 200; i++) {
  movies.push({
    title: "Movie " + i,
    img: `https://via.placeholder.com/300x450?text=Movie+${i}`,
    video: "https://www.w3schools.com/html/mov_bbb.mp4",
    desc: "This is a high-quality streaming movie. Enjoy cinematic visuals, action, and storytelling in Movie " + i + "."
  });
}

function loadMovies(list) {
  home.innerHTML = "";
  list.forEach(movie => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${movie.img}">
      <p>${movie.title}</p>
    `;

    div.onclick = () => openDetail(movie);
    home.appendChild(div);
  });
}

function openDetail(movie) {
  home.style.display = "none";
  detailPage.style.display = "block";

  document.getElementById("detailImg").src = movie.img;
  document.getElementById("detailTitle").innerText = movie.title;
  document.getElementById("detailDesc").innerText = movie.desc;

  document.getElementById("downloadLink").href = movie.video;

  currentMovie = movie;
}

function goBack() {
  detailPage.style.display = "none";
  home.style.display = "grid";
  player.style.display = "none";
  player.pause();
}

let currentMovie = null;

function playMovie() {
  player.style.display = "block";
  player.src = currentMovie.video;
}

/* SEARCH */
document.getElementById("search").addEventListener("input", e => {
  const value = e.target.value.toLowerCase();
  const filtered = movies.filter(m =>
    m.title.toLowerCase().includes(value)
  );
  loadMovies(filtered);
});

loadMovies(movies);
</script>

</body>
</html>
