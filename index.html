<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StreamHub Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0f;
  color: white;
}

/* NAVBAR */
header {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: linear-gradient(to bottom, black, transparent);
  position: fixed;
  width: 100%;
  z-index: 10;
}

.logo {
  color: #00ffe1;
  font-size: 24px;
  font-weight: bold;
}

input {
  padding: 8px;
  border-radius: 6px;
  border: none;
  background: #222;
  color: white;
}

/* HERO */
.hero {
  height: 85vh;
  background: url("https://images.unsplash.com/photo-1497032628192-86f99bcd76bc") center/cover;
  display: flex;
  align-items: flex-end;
  padding: 40px;
}

.hero-content {
  max-width: 500px;
}

.hero h1 {
  font-size: 50px;
}

.hero button {
  padding: 10px 20px;
  background: #00ffe1;
  border: none;
  cursor: pointer;
}

/* SECTIONS */
.section {
  padding: 20px;
}

.row {
  display: flex;
  overflow-x: auto;
  gap: 12px;
}

.card {
  position: relative;
  min-width: 160px;
  height: 230px;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
}

.card img, .card video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* hover video */
.card video {
  position: absolute;
  top: 0;
  left: 0;
  opacity: 0;
  transition: 0.3s;
}

.card:hover video {
  opacity: 1;
}

.card:hover {
  transform: scale(1.1);
}

/* watchlist button */
.save-btn {
  position: absolute;
  bottom: 10px;
  right: 10px;
  background: #00ffe1;
  border: none;
  padding: 5px;
  cursor: pointer;
  border-radius: 5px;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  justify-content: center;
  align-items: center;
}

.modal video {
  width: 75%;
}
</style>
</head>

<body>

<header>
  <div class="logo">StreamHub Pro</div>
  <input type="text" id="search" placeholder="Search movies...">
</header>

<div class="hero">
  <div class="hero-content">
    <h1>Featured Movie</h1>
    <button onclick="playFeatured()">▶ Watch</button>
  </div>
</div>

<div id="content"></div>

<div class="modal" id="modal">
  <video id="player" controls></video>
</div>

<script>
let watchlist = JSON.parse(localStorage.getItem("watchlist")) || [];

const library = [
  {
    title: "Trending",
    items: generateItems("T", 10)
  },
  {
    title: "Action",
    items: generateItems("A", 10)
  },
  {
    title: "Anime",
    items: generateItems("Anime", 10)
  }
];

function generateItems(prefix, count) {
  let arr = [];
  for (let i = 1; i <= count; i++) {
    arr.push({
      name: prefix + " " + i,
      img: `https://via.placeholder.com/160x230?text=${prefix}${i}`,
      video: "https://www.w3schools.com/html/mov_bbb.mp4"
    });
  }
  return arr;
}

const content = document.getElementById("content");

function loadContent(data) {
  content.innerHTML = "";

  data.forEach(section => {
    const div = document.createElement("div");
    div.className = "section";

    div.innerHTML = `
      <h2>${section.title}</h2>
      <div class="row">
        ${section.items.map(item => `
          <div class="card">
            <img src="${item.img}">
            <video muted loop src="${item.video}"></video>

            <button class="save-btn" onclick="saveItem('${item.name}')">⭐</button>

            <div onclick="openPlayer('${item.video}')" style="position:absolute;top:0;width:100%;height:100%;"></div>
          </div>
        `).join("")}
      </div>
    `;

    content.appendChild(div);
  });
}

function openPlayer(src) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("player").src = src;
}

function playFeatured() {
  openPlayer("https://www.w3schools.com/html/movie.mp4");
}

function saveItem(name) {
  if (!watchlist.includes(name)) {
    watchlist.push(name);
    localStorage.setItem("watchlist", JSON.stringify(watchlist));
    alert("Saved to Watchlist ⭐");
  }
}

/* SEARCH */
document.getElementById("search").addEventListener("input", e => {
  const value = e.target.value.toLowerCase();

  const filtered = library.map(section => ({
    ...section,
    items: section.items.filter(item =>
      item.name.toLowerCase().includes(value)
    )
  })).filter(section => section.items.length > 0);

  loadContent(filtered);
});

loadContent(library);
</script>

</body>
</html>
